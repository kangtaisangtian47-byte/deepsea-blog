<footer>
  <div class="container">
    <div class="row">
      <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">
        <ul class="list-inline text-center footer-links">
          {{ range .Site.Data.beautifulhugo.social.social_icons }}
            {{- if isset $.Site.Params.author .id }}
              <li>
                <a href="{{ if (hasPrefix (index $.Site.Params.author .id) "http") }}{{ index $.Site.Params.author .id }}{{ else }}{{ printf .url (index $.Site.Params.author .id) }}{{ end }}" title="{{ .title }}">
                  <span class="fa-stack fa-lg">
                    <i class="fas fa-circle fa-stack-2x"></i>
                    <i class="{{ .icon }} fa-stack-1x fa-inverse"></i>
                  </span>
                </a>
              </li>
            {{- end -}}
          {{ end }}
        </ul>
        <p class="credits copyright text-muted">
          {{ .Site.Params.author.name }} &nbsp;&bull;&nbsp;&copy; {{ now.Format "2006" }}
          {{ if .Site.Title }} &nbsp;&bull;&nbsp; <a href="{{ "" | absLangURL }}">{{ .Site.Title }}</a> {{ end }}
        </p>
        <p class="credits text-muted text-center">
          <a href="{{ "privacy-policy" | relURL }}">プライバシーポリシー</a>
        </p>
      </div>
    </div>
  </div>
</footer>

<script src="https://code.jquery.com/jquery-3.7.0.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js"></script>
<script src="{{ "js/main.js" | absURL }}"></script>
