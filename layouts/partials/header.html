<header class="header-section">
  <div class="intro-header" style="background-image: url('/img/header-bg.jpg'); background-size: cover; padding: 100px 0; text-align: center; color: white; background-color: #7199b9;">
    <div class="container">
      <h1 style="font-size: 3em; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin: 0;">{{ .Site.Title }}</h1>
      {{ if .Site.Params.subtitle }}
        <p style="font-size: 1.2em; opacity: 0.9; margin-top: 10px;">{{ .Site.Params.subtitle }}</p>
      {{ end }}
    </div>
  </div>
</header>
